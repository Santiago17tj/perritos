workflows:
  # ──────────────────────────────────────────────
  # WORKFLOW ANDROID — APK de release
  # ──────────────────────────────────────────────
  android-release:
    name: Android APK (Release)
    max_build_duration: 60
    working_directory: perrito_perron
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependencias
        script: flutter pub get
      - name: Analizar código
        script: flutter analyze --no-fatal-infos
      - name: Compilar APK
        script: flutter build apk --release
    artifacts:
      - perrito_perron/build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - tu_correo@gmail.com  # ← Cambia esto por tu correo en el panel
        notify:
          success: true
          failure: true

  # ──────────────────────────────────────────────
  # WORKFLOW iOS — IPA para instalar en iPhone
  # ──────────────────────────────────────────────
  ios-development:
    name: iOS IPA (Development - Tu iPhone)
    max_build_duration: 60
    working_directory: perrito_perron
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: development
        bundle_identifier: com.perritoperron.app
    scripts:
      - name: Instalar dependencias
        script: flutter pub get
      - name: Compilar iOS
        script: |
          flutter build ios --release --no-codesign
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/perrito_perron/Runner.xcarchive" \
            archive
    artifacts:
      - perrito_perron/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tu_correo@gmail.com  # ← Cambia esto por tu correo en el panel
        notify:
          success: true
          failure: true
