workflows:
  # ──────────────────────────────────────────────
  # WORKFLOW ANDROID — APK de release
  # ──────────────────────────────────────────────
  android-release:
    name: Android APK (Release)
    max_build_duration: 60
    working_directory: perrito_perron
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependencias
        script: flutter pub get
      - name: Analizar código
        script: flutter analyze --no-fatal-infos
      - name: Compilar APK
        script: flutter build apk --release
    artifacts:
      - perrito_perron/build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - santiago123565@gmail.com
        notify:
          success: true
          failure: true

  # ──────────────────────────────────────────────
  # WORKFLOW iOS — IPA para instalar en iPhone
  # ──────────────────────────────────────────────
  ios-development:
    name: iOS IPA (Development - Tu iPhone)
    max_build_duration: 60
    working_directory: perrito_perron
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependencias
        script: flutter pub get
      - name: Compilar y empaquetar IPA sin firma para AltStore
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../../ios/Runner.ipa Payload
    artifacts:
      - perrito_perron/build/ios/Runner.ipa
    publishing:
      email:
        recipients:
          - santiago123565@gmail.com
        notify:
          success: true
          failure: true
